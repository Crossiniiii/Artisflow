<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Prevent Browser Caching -->
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Galerie Joaquin | Inventory System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }

        .custom-scrollbar::-webkit-scrollbar-track {
            background: transparent;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb {
            background-color: #e2e8f0;
            border-radius: 3px;
        }

        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background-color: #cbd5e1;
        }
    </style>
    <!-- Module Loading Fail-safe -->
    <script>
        window.onerror = function (msg, url, line, col, error) {
            console.error('Window Error:', msg, 'at', url, ':', line);
            // If it's a module loading error (often shows a white screen), show a recovery hint
            if (msg.indexOf('Script error') > -1 || msg.indexOf('Importing') > -1) {
                setTimeout(function () {
                    if (!document.getElementById('root').hasChildNodes()) {
                        document.body.innerHTML = '<div style="font-family:sans-serif;padding:40px;text-align:center;">' +
                            '<h2>Loading Error Detected</h2>' +
                            '<p>We detected a problem loading the application modules.</p>' +
                            '<button onclick="localStorage.clear();location.reload();" style="padding:10px 20px;border-radius:8px;background:#000;color:#fff;border:none;cursor:pointer;">Reset & Retry</button>' +
                            '</div>';
                    }
                }, 3000);
            }
            return false;
        };
    </script>
    <link rel="stylesheet" href="/index.css">
</head>

<body>
    <div id="root"></div>
    <script type="module" src="/src/index.tsx"></script>
</body>

</html>
