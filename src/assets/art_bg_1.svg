<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="watercolor">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="20" />
      <feGaussianBlur stdDeviation="5" />
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#fffcf5"/>
  <g filter="url(#watercolor)" opacity="0.9">
    <circle cx="200" cy="200" r="150" fill="#ffead2" />
    <circle cx="600" cy="400" r="180" fill="#ffbca5" />
    <circle cx="400" cy="300" r="120" fill="#aaccff" />
    <path d="M100,500 Q200,400 300,500 T500,500" stroke="#bae6fc" stroke-width="20" fill="none" />
  </g>
</svg>
