<svg width="800" height="600" viewBox="0 0 800 600" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="paint">
      <feTurbulence type="turbulence" baseFrequency="0.05" numOctaves="3" result="turbulence"/>
      <feDisplacementMap in2="turbulence" in="SourceGraphic" scale="25" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
  </defs>
  <rect width="100%" height="100%" fill="#fff5f5"/>
  <g filter="url(#paint)" opacity="0.85">
    <rect x="50" y="50" width="200" height="200" fill="#d4fc79" rx="20" />
    <rect x="500" y="300" width="250" height="150" fill="#96e6a1" rx="50" />
    <circle cx="400" cy="300" r="100" fill="#84fab0" />
    <path d="M0,0 L800,600" stroke="#fccb90" stroke-width="50" stroke-linecap="round" opacity="0.3"/>
    <path d="M800,0 L0,600" stroke="#d57eeb" stroke-width="30" stroke-linecap="round" opacity="0.3"/>
  </g>
</svg>
